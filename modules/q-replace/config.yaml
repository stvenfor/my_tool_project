device: auto  # auto | mps | cpu

video:
  analysis_fps: 15
  output_fps: 30
  scene_threshold: 0.30
  min_shot_duration: 0.3

tracking:
  model: yolov8n.pt
  conf: 0.35
  iou: 0.45
  mask_feather: 12

motion:
  pose_model: pose_landmarker_heavy.task
  face_model: face_landmarker.task
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

identity:
  prompt: >-
    3D pixar otter character, yellow construction helmet, holding shovel,
    cute mascot, blind box toy style, smooth plastic material, studio lighting,
    full body, clean white background, high quality render
  negative_prompt: >-
    realistic, photo, human, blurry, low quality, deformed, extra limbs, text, watermark
  num_inference_steps: 28
  guidance_scale: 7.5
  strength: 0.72
  seed: 42

synthesis:
  keyframe_interval: 18
  ip_adapter_scale: 0.65
  controlnet_conditioning_scale: 1.0
  num_inference_steps: 12
  guidance_scale: 7.0
  use_optical_flow: false
  wav2lip_enabled: true
  wav2lip_threshold: 0.35
  min_track_frames: 5
  max_persons_per_frame: 4

composite:
  alpha_feather: 10
  color_match: true

output:
  crf: 18
  preview_duration: 3.0

models:
  sdxl_base: stabilityai/stable-diffusion-xl-base-1.0
  controlnet_openpose: xinsir/controlnet-openpose-sdxl-1.0
  ip_adapter: h94/IP-Adapter
  ip_adapter_weight: ip-adapter_sdxl.bin
