}
document.getElementById("subtitle").textContent =
  `数据日期 ${DATA.dataDate} · 生成于 ${DATA.generatedAt} · 共 ${DATA.rows.length} 只 · 「30日至今」= ${DATA.ret30Entry} 收盘买入持有至 ${DATA.ret30AsOf}；用下方筛选项按状态/趋势/收益筛选与排序`;
document.getElementById("stats").innerHTML = `
  <div class="stat ok"><div class="v">${counts.byAction["技术候选"]||0}</div><div class="l">技术候选</div></div>
  <div class="stat info"><div class="v">${counts.byAction["观察"]||0}</div><div class="l">观察</div></div>
  <div class="stat warn"><div class="v">${counts.byAction["不追涨"]||0}</div><div class="l">不追涨</div></div>
  <div class="stat"><div class="v">${counts.byAction["暂缓"]||0}</div><div class="l">暂缓 · 宽度 ${DATA.breadthPct}%</div></div>`;
fillSelect(document.getElementById("action"), ACTIONS, "状态");
fillSelect(document.getElementById("trend"), TRENDS, "趋势");
fillSelect(document.getElementById("ret30"), RET30S, "30日至今");
fillSelect(document.getElementById("sort"), SORTS, "");
document.getElementById("sort").value="ret30_desc";
function render(){
  const action=document.getElementById("action").value;
  const trend=document.getElementById("trend").value;
  const ret30=document.getElementById("ret30").value;
  const sortBy=document.getElementById("sort").value;
  let rows=DATA.rows.filter(r=>{
    if(action!=="全部"&&r.action!==action) return false;
    if(trend!=="全部"&&r.trend!==trend) return false;
    if(ret30==="正收益"&&(r.ret30Hold===null||r.ret30Hold<=0)) return false;
    if(ret30==="负收益"&&(r.ret30Hold===null||r.ret30Hold>=0)) return false;
    if(ret30==="持平/--"&&r.ret30Hold!==null&&r.ret30Hold!==0) return false;
    return true;
  });
  const cmpNull=(get,desc)=>(a,b)=>{
    const av=get(a), bv=get(b);
    if(av===null&&bv===null) return a.reportIndex-b.reportIndex;
    if(av===null) return 1; if(bv===null) return -1;
    return desc?(bv-av):(av-bv);
  };
  const cmpNum=(get,desc)=>(a,b)=> (desc?get(b)-get(a):get(a)-get(b)) || a.reportIndex-b.reportIndex;
  if(sortBy==="ret30_desc") rows.sort(cmpNull(r=>r.ret30Hold,true));
  else if(sortBy==="ret30_asc") rows.sort(cmpNull(r=>r.ret30Hold,false));
  else if(sortBy==="ret5_desc") rows.sort(cmpNum(r=>r.ret5,true));
  else if(sortBy==="ret5_asc") rows.sort(cmpNum(r=>r.ret5,false));
  else if(sortBy==="ret10_desc") rows.sort(cmpNum(r=>r.ret10,true));
  else if(sortBy==="ret10_asc") rows.sort(cmpNum(r=>r.ret10,false));
  else if(sortBy==="ret20_desc") rows.sort(cmpNum(r=>r.ret20,true));
  else if(sortBy==="ret20_asc") rows.sort(cmpNum(r=>r.ret20,false));
  else rows.sort((a,b)=>a.reportIndex-b.reportIndex);
  document.getElementById("count").textContent=`明细（${rows.length} / ${DATA.rows.length}）`;
  document.getElementById("tbody").innerHTML=rows.map(r=>{
    let tone="";
    if(r.action==="技术候选") tone="success";
    else if(r.action==="不追涨") tone="warning";
    else if(r.trend==="空头") tone="danger";
    return `<tr class="${tone}">
      <td><span class="pill ${actionClass(r.action)}">${r.action}</span></td>
      <td>${r.code}</td><td>${r.name}</td>
      <td><span class="pill ${trendClass(r.trend)}">${r.trend}</span></td>
      <td class="num ${pctClass(r.ret30Hold)}">${fmtPct(r.ret30Hold)}</td>
      <td class="num ${pctClass(r.ret1)}">${fmtPct(r.ret1)}</td>
      <td class="num ${pctClass(r.ret5)}">${fmtPct(r.ret5)}</td>
      <td class="num ${pctClass(r.ret10)}">${fmtPct(r.ret10)}</td>
      <td class="num ${pctClass(r.ret20)}">${fmtPct(r.ret20)}</td>
      <td class="num">${r.rsi.toFixed(1)}</td><td>${r.kdj}</td><td>${r.macd}</td>
      <td>${r.sentiment.toFixed(1)}（${r.sentimentLabel}）</td>
      <td class="num">${fmtFlow(r.flow5)}</td><td class="num">${fmtFlow(r.flow10)}</td>
    </tr>`;
  }).join("");
}
["action","trend","ret30","sort"].forEach(id=>document.getElementById(id).addEventListener("change", render));
render();
</script>
</body>
</html>
