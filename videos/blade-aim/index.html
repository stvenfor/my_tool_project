<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #0b0c10;
      }
      body { font-family: Inter, sans-serif; }
      #root { position: relative; width: 1920px; height: 1080px; background: #0b0c10; }

      .scene { position: absolute; inset: 0; opacity: 0; }

      .sky {
        position: absolute; inset: 0;
        background:
          radial-gradient(ellipse 90% 50% at 50% 0%, #1a1e2a 0%, transparent 55%),
          linear-gradient(180deg, #0f1118 0%, #0b0c10 55%, #12141c 100%);
      }

      .ground {
        position: absolute; left: 0; right: 0; bottom: 0; height: 280px;
        background: linear-gradient(180deg, #1c1f28 0%, #14161e 40%, #0e1016 100%);
        border-top: 2px solid rgba(120, 130, 150, 0.25);
      }

      .stone-line {
        position: absolute; left: 0; right: 0; bottom: 278px; height: 1px;
        background: rgba(160, 170, 190, 0.2);
      }

      .gate {
        position: absolute; left: 50%; bottom: 280px; width: 420px; height: 380px;
        margin-left: -210px;
        background: linear-gradient(180deg, #2a2e3a 0%, #1a1d26 100%);
        border: 3px solid #3a4050;
        border-bottom: none;
      }
      .gate::before, .gate::after {
        content: ""; position: absolute; top: -40px; width: 56px; height: 420px;
        background: #252936; border: 2px solid #3a4050;
      }
      .gate::before { left: -70px; }
      .gate::after { right: -70px; }

      .tower {
        position: absolute; right: 180px; top: 60px; width: 160px; height: 420px;
        background: linear-gradient(180deg, #2e3340 0%, #1a1d26 100%);
        border: 2px solid #3a4050;
      }
      .tower-window {
        position: absolute; left: 48px; top: 80px; width: 64px; height: 48px;
        background: #0b0c10; border: 2px solid #4a5568;
      }
      .tower-roof {
        position: absolute; left: -20px; top: -50px; width: 0; height: 0;
        border-left: 100px solid transparent;
        border-right: 100px solid transparent;
        border-bottom: 55px solid #3a4050;
      }

      .ship {
        position: absolute; left: 50%; top: 40px; width: 520px; height: 120px;
        margin-left: -260px;
        background: linear-gradient(180deg, #e8e8ec 0%, #c8c8d0 100%);
        border-radius: 60px 60px 20px 20px;
        box-shadow: 0 0 60px rgba(255, 255, 255, 0.15);
        opacity: 0;
      }
      .ship-beam {
        position: absolute; left: 50%; top: 160px; width: 80px; height: 0;
        margin-left: -40px;
        background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, transparent 100%);
        opacity: 0;
      }

      .caption {
        position: absolute; left: 80px; right: 80px; bottom: 56px;
        text-align: center; font-size: 32px; font-weight: 500;
        letter-spacing: 0.1em; color: #d4d0c8; line-height: 1.5;
      }
      .caption-dim { color: #b0a898; font-size: 26px; letter-spacing: 0.16em; }
      .act-title {
        position: absolute; left: 0; right: 0; top: 42%;
        text-align: center; font-size: 64px; font-weight: 700;
        letter-spacing: 0.35em; color: #e8e4dc;
      }
      .act-sub {
        position: absolute; left: 0; right: 0; top: 54%;
        text-align: center; font-size: 24px; font-weight: 500;
        letter-spacing: 0.5em; color: #6a6570;
      }
      .dialogue {
        position: absolute; left: 120px; right: 120px; bottom: 120px;
        text-align: center; font-size: 30px; font-weight: 500;
        letter-spacing: 0.08em; color: #c8c4bc; line-height: 1.6;
      }
      .name-tag {
        display: inline; color: #9a9a9a; font-weight: 700; margin-right: 0.4em;
      }
      .name-red { color: #c44545; }

      /* Stick figures */
      .fig { position: absolute; width: 90px; height: 150px; }
      .fig svg { width: 100%; height: 100%; overflow: visible; }
      .s { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .h { fill: none; stroke-width: 6; }
      .blade .s, .blade .h { stroke: #8a8a8a; }
      .aim .s, .aim .h { stroke: #c44545; }
      .white .s, .white .h { stroke: #e0e0e6; }
      .white-dim .s, .white-dim .h { stroke: rgba(220,220,230,0.35); stroke-width: 4; }

      .blade-weapon {
        position: absolute; width: 4px; height: 70px;
        background: #b0b0b0; transform-origin: 50% 100%;
      }
      .gun {
        position: absolute; width: 56px; height: 10px;
        background: #c44545; border-radius: 2px;
        transform-origin: 0% 50%;
      }
      .gun::after {
        content: ""; position: absolute; left: 0; top: -4px;
        width: 14px; height: 18px; background: #a03838; border-radius: 2px;
      }

      .shield {
        position: absolute; width: 36px; height: 48px;
        background: rgba(220, 220, 230, 0.85);
        border: 2px solid #fff; border-radius: 4px;
      }
      .chain-ball {
        position: absolute; width: 28px; height: 28px;
        background: #d0d0d8; border-radius: 50%;
        box-shadow: 0 0 12px rgba(200, 200, 220, 0.4);
      }
      .chain-line {
        position: absolute; height: 3px; background: #a8a8b0;
        transform-origin: 0% 50%;
      }

      .crack {
        position: absolute; width: 200px; height: 200px;
        border: 2px solid rgba(140, 200, 255, 0.5);
        border-radius: 50%; opacity: 0;
      }
      .shard {
        position: absolute; width: 6px; height: 18px;
        background: #e0e0e6; opacity: 0;
      }
      .bullet-trail {
        position: absolute; height: 3px; background: #ff6b6b;
        transform-origin: 0% 50%; opacity: 0;
        box-shadow: 0 0 8px #ff4444;
      }
      .red-wall {
        position: absolute; left: 60%; bottom: 280px; width: 0; height: 420px;
        background: linear-gradient(90deg, rgba(196,69,69,0.85) 0%, rgba(196,69,69,0.2) 100%);
        box-shadow: 0 0 40px rgba(196, 69, 69, 0.5);
        opacity: 0;
      }
      .gray-wave {
        position: absolute; left: 50%; bottom: 280px; width: 20px; height: 20px;
        margin-left: -10px;
        background: radial-gradient(circle, rgba(160,160,160,0.9) 0%, transparent 70%);
        border-radius: 50%; opacity: 0;
      }
      .wound {
        position: absolute; width: 40px; height: 3px;
        background: rgba(100, 100, 100, 0.8); opacity: 0;
      }

      .army-row { position: absolute; bottom: 290px; left: 0; right: 0; height: 150px; }
    </style>
  </head>

      <!-- ===== MELEE ===== -->
