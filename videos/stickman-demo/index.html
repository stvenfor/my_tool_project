<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #1a1814;
      }
      body { font-family: Inter, sans-serif; }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #1a1814;
      }

      .scene {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .paper {
        position: absolute;
        left: 210px;
        top: 90px;
        width: 1500px;
        height: 900px;
        background:
          linear-gradient(180deg, #faf6ee 0%, #f0e8d8 100%);
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.45),
          inset 0 0 0 1px rgba(0, 0, 0, 0.06);
      }

      .paper-lines {
        position: absolute;
        inset: 48px 56px;
        background-image: repeating-linear-gradient(
          transparent,
          transparent 47px,
          rgba(80, 100, 140, 0.08) 47px,
          rgba(80, 100, 140, 0.08) 48px
        );
        pointer-events: none;
      }

      .margin-rule {
        position: absolute;
        left: 120px;
        top: 48px;
        bottom: 48px;
        width: 2px;
        background: rgba(200, 80, 80, 0.25);
      }

      .desk {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 70% 60% at 50% 40%, #2a2620 0%, #1a1814 75%);
      }

      .caption {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 72px;
        text-align: center;
        font-size: 36px;
        font-weight: 500;
        letter-spacing: 0.12em;
        color: #ebe4d8;
      }

      .caption-dim {
        color: #9a9184;
        font-size: 28px;
        letter-spacing: 0.18em;
      }

      .title-big {
        position: absolute;
        left: 0;
        right: 0;
        top: 42%;
        text-align: center;
        font-size: 72px;
        font-weight: 700;
        letter-spacing: 0.28em;
        color: #ebe4d8;
      }

      .title-sub {
        position: absolute;
        left: 0;
        right: 0;
        top: 54%;
        text-align: center;
        font-size: 28px;
        font-weight: 500;
        letter-spacing: 0.4em;
        color: #7a7268;
      }

      /* Stick figures */
      .fig {
        position: absolute;
        width: 120px;
        height: 200px;
      }
      .fig svg { width: 100%; height: 100%; overflow: visible; }
      .fig .s {
        fill: none;
        stroke: #5a5a5a;
        stroke-width: 7;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fig .h {
        fill: none;
        stroke: #5a5a5a;
        stroke-width: 7;
      }
      .fig-ghost .s, .fig-ghost .h {
        stroke: #b8b0a4;
        stroke-width: 5;
        stroke-dasharray: 6 8;
      }
      .fig-ghost-stroke {
        stroke: #b8b0a4 !important;
        stroke-width: 5 !important;
        stroke-dasharray: 5 7;
      }

      .wing {
        fill: none;
        stroke: #6b7a9a;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .wing-fill {
        fill: rgba(120, 140, 180, 0.18);
        stroke: #6b7a9a;
        stroke-width: 3;
      }

      .folder {
        position: absolute;
        left: 1280px;
        top: 220px;
        width: 420px;
        height: 520px;
      }
      .folder-tab {
        position: absolute;
        left: 24px;
        top: 0;
        width: 140px;
        height: 36px;
        background: #c4a574;
        border-radius: 6px 6px 0 0;
      }
      .folder-body {
        position: absolute;
        left: 0;
        top: 28px;
        width: 420px;
        height: 480px;
        background: linear-gradient(180deg, #d4b896 0%, #c4a574 100%);
        border-radius: 0 10px 10px 10px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .folder-paper {
        position: absolute;
        left: 28px;
        top: 56px;
        width: 360px;
        height: 400px;
        background: #faf6ee;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.05);
      }
      .folder-label {
        position: absolute;
        left: 40px;
        top: 18px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: #5a4830;
      }

      .note {
        position: absolute;
        left: 820px;
        top: 480px;
        width: 280px;
        height: 160px;
        background: #fffdf8;
        box-shadow: 2px 8px 24px rgba(0, 0, 0, 0.25);
        transform: rotate(-4deg);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .note-text {
        font-size: 64px;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: #2a2a2a;
      }

      .pen {
        position: absolute;
        width: 12px;
        height: 220px;
        background: linear-gradient(180deg, #2a2a2a 0%, #2a2a2a 70%, #c0a060 70%, #c0a060 88%, #1a1a1a 88%);
        border-radius: 2px;
        transform-origin: 50% 0%;
      }
      .pen-tip {
        position: absolute;
        left: 50%;
        bottom: -8px;
        width: 0;
        height: 0;
        margin-left: -6px;
        border-left: 6px solid transparent;
        border-right: 6px solid transparent;
        border-top: 14px solid #1a1a1a;
      }

      .mug {
        position: absolute;
        width: 70px;
        height: 80px;
        background: #e8e0d4;
        border-radius: 6px 6px 10px 10px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
      }
      .mug::after {
        content: "";
        position: absolute;
        right: -18px;
        top: 16px;
        width: 22px;
        height: 36px;
        border: 5px solid #e8e0d4;
        border-left: none;
        border-radius: 0 14px 14px 0;
      }
      .steam {
        position: absolute;
        width: 8px;
        height: 40px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.25);
      }

      .impact {
        position: absolute;
        width: 80px;
        height: 80px;
        border: 4px solid #5a5a5a;
        border-radius: 50%;
        opacity: 0;
      }

      .burst {
        position: absolute;
        width: 4px;
        height: 40px;
        background: #5a5a5a;
        border-radius: 2px;
        opacity: 0;
      }

      .day-label {
        position: absolute;
        left: 64px;
        top: 48px;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.2em;
        color: #7a7268;
      }

      .sketch-edge {
        position: absolute;
        left: 210px;
        top: 90px;
        width: 1500px;
        height: 900px;
        border: 2px dashed transparent;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="56"
      data-width="1920"
      data-height="1080"
    >
      <!-- ========== SCENE 0: Title ========== -->
      <div id="sc-title" class="scene clip" data-start="0" data-duration="5" data-track-index="0">
        <div class="desk"></div>
        <div id="title-main" class="title-big">换我</div>
        <div id="title-sub" class="title-sub">GRAY STICKMAN</div>
      </div>

      <!-- ========== SCENE 1: Death loop ========== -->
      <div id="sc-loop" class="scene clip" data-start="4.5" data-duration="12" data-track-index="1">
        <div class="desk"></div>
        <div class="paper">
          <div class="paper-lines"></div>
          <div class="margin-rule"></div>
          <!-- death ghosts in background -->
          <div id="ghost-1" class="fig fig-ghost" style="left: 180px; top: 280px; opacity: 0.35">
            <svg viewBox="0 0 120 200"><circle class="h" cx="60" cy="28" r="18"/><line class="s" x1="60" y1="46" x2="60" y2="110"/><line class="s" x1="60" y1="60" x2="28" y2="95"/><line class="s" x1="60" y1="60" x2="92" y2="95"/><line class="s" x1="60" y1="110" x2="32" y2="170"/><line class="s" x1="60" y1="110" x2="88" y2="170"/></svg>
          </div>
          <div id="ghost-2" class="fig fig-ghost" style="left: 980px; top: 200px; opacity: 0.25; transform: rotate(90deg)">
            <svg viewBox="0 0 120 200"><circle class="h" cx="60" cy="28" r="18"/><line class="s" x1="60" y1="46" x2="60" y2="110"/><line class="s" x1="60" y1="60" x2="28" y2="95"/><line class="s" x1="60" y1="60" x2="92" y2="95"/><line class="s" x1="60" y1="110" x2="32" y2="170"/><line class="s" x1="60" y1="110" x2="88" y2="170"/></svg>
          </div>
          <div id="hero" class="fig" style="left: 690px; top: 320px">
            <svg viewBox="0 0 120 200">
              <circle class="h" id="hero-head" cx="60" cy="28" r="18"/>
              <line class="s" x1="60" y1="46" x2="60" y2="110"/>
              <g id="hero-arm-L"><line class="s" x1="60" y1="60" x2="28" y2="95"/></g>
              <g id="hero-arm-R"><line class="s" x1="60" y1="60" x2="92" y2="95"/></g>
              <g id="hero-leg-L"><line class="s" x1="60" y1="110" x2="32" y2="170"/></g>
              <g id="hero-leg-R"><line class="s" x1="60" y1="110" x2="88" y2="170"/></g>
            </svg>
          </div>
          <div id="impact" class="impact" style="left: 710px; top: 300px"></div>
          <div id="burst-1" class="burst" style="left: 748px; top: 340px"></div>
          <div id="burst-2" class="burst" style="left: 748px; top: 340px"></div>
          <div id="burst-3" class="burst" style="left: 748px; top: 340px"></div>
          <div id="burst-4" class="burst" style="left: 748px; top: 340px"></div>
        </div>
        <div id="cap-loop" class="caption">每一帧都是死亡，循环播放</div>
      </div>

      <!-- ========== SCENE 2: Creator leaves for coffee ========== -->
      <div id="sc-coffee" class="scene clip" data-start="15.5" data-duration="7" data-track-index="2">
        <div class="desk"></div>
        <div class="paper" style="opacity: 0.55; transform: scale(0.92); left: 280px; top: 140px">
          <div class="paper-lines"></div>
          <div id="hero-small" class="fig" style="left: 690px; top: 320px; transform: scale(0.7)">
            <svg viewBox="0 0 120 200">
              <circle class="h" cx="60" cy="28" r="18"/>
              <line class="s" x1="60" y1="46" x2="60" y2="110"/>
              <line class="s" x1="60" y1="60" x2="28" y2="95"/>
              <line class="s" x1="60" y1="60" x2="92" y2="95"/>
              <line class="s" x1="60" y1="110" x2="32" y2="170"/>
              <line class="s" x1="60" y1="110" x2="88" y2="170"/>
            </svg>
          </div>
        </div>
        <div id="mug" class="mug" style="left: 1520px; top: 620px"></div>
        <div id="steam-1" class="steam" style="left: 1540px; top: 560px"></div>
        <div id="steam-2" class="steam" style="left: 1558px; top: 550px"></div>
        <div id="cap-coffee" class="caption">创作者去倒咖啡</div>
      </div>

      <!-- ========== SCENE 3: Escape to folder ========== -->
      <div id="sc-escape" class="scene clip" data-start="21.5" data-duration="9" data-track-index="3">
        <div class="desk"></div>
        <div id="paper-escape" class="paper" style="left: 80px; top: 140px; width: 1100px; height: 780px">
          <div class="paper-lines"></div>
          <div class="margin-rule"></div>
          <div id="edge-glow" class="sketch-edge" style="left: 0; top: 0; width: 1100px; height: 780px; border-color: rgba(90,90,90,0.15)"></div>
        </div>
        <div id="folder" class="folder">
          <div class="folder-tab"></div>
          <div class="folder-body">
            <div class="folder-label">characters / draft</div>
            <div class="folder-paper">
              <div id="wing-char" class="fig" style="left: 120px; top: 90px; opacity: 0.9">
                <svg viewBox="0 0 160 220">
                  <path id="left-wing" class="wing-fill" d="M58 70 C20 40, 8 90, 28 120 C40 140, 52 110, 58 95 Z"/>
                  <circle class="h fig-ghost-stroke" cx="80" cy="40" r="16"/>
                  <line class="s fig-ghost-stroke" x1="80" y1="56" x2="80" y2="120"/>
                  <line class="s fig-ghost-stroke" x1="80" y1="72" x2="52" y2="105"/>
                  <line class="s fig-ghost-stroke" x1="80" y1="72" x2="108" y2="105"/>
                  <line class="s fig-ghost-stroke" x1="80" y1="120" x2="56" y2="175"/>
                  <line class="s fig-ghost-stroke" x1="80" y1="120" x2="104" y2="175"/>
                  <path id="right-wing-hint" class="wing" d="M102 70 C140 40, 152 90, 132 120" opacity="0.25"/>
                </svg>
              </div>
            </div>
          </div>
        </div>
        <div id="hero-climb" class="fig" style="left: 900px; top: 400px">
          <svg viewBox="0 0 120 200">
            <circle class="h" cx="60" cy="28" r="18"/>
            <line class="s" x1="60" y1="46" x2="60" y2="110"/>
            <g id="climb-arm-L"><line class="s" x1="60" y1="60" x2="28" y2="95"/></g>
            <g id="climb-arm-R"><line class="s" x1="60" y1="60" x2="92" y2="95"/></g>
            <g id="climb-leg-L"><line class="s" x1="60" y1="110" x2="32" y2="170"/></g>
            <g id="climb-leg-R"><line class="s" x1="60" y1="110" x2="88" y2="170"/></g>
          </svg>
        </div>
        <div id="cap-escape" class="caption clip" data-start="21.5" data-duration="6.5" data-track-index="10">从草稿纸边缘爬了出来</div>
        <div id="cap-escape-2" class="caption clip" data-start="21.5" data-duration="9" data-track-index="11" style="opacity: 0">钻进隔壁的文件夹</div>
      </div>

      <!-- ========== SCENE 4: Meet the half-drawn wing ========== -->
      <div id="sc-wing" class="scene clip" data-start="29.5" data-duration="7" data-track-index="4">
        <div class="desk"></div>
        <div class="paper" style="left: 360px; top: 80px; width: 1200px; height: 820px">
          <div class="paper-lines"></div>
          <div id="meet-hero" class="fig" style="left: 280px; top: 280px">
            <svg viewBox="0 0 120 200">
              <circle class="h" cx="60" cy="28" r="18"/>
              <line class="s" x1="60" y1="46" x2="60" y2="110"/>
              <line class="s" x1="60" y1="60" x2="28" y2="95"/>
              <line class="s" x1="60" y1="60" x2="92" y2="95"/>
              <line class="s" x1="60" y1="110" x2="32" y2="170"/>
              <line class="s" x1="60" y1="110" x2="88" y2="170"/>
            </svg>
          </div>
          <div id="meet-wing" class="fig" style="left: 620px; top: 220px; width: 200px; height: 280px">
            <svg viewBox="0 0 160 220">
              <path class="wing-fill" d="M58 70 C20 40, 8 90, 28 120 C40 140, 52 110, 58 95 Z"/>
              <circle class="h fig-ghost-stroke" cx="80" cy="40" r="16"/>
              <line class="s fig-ghost-stroke" x1="80" y1="56" x2="80" y2="120"/>
              <line class="s fig-ghost-stroke" x1="80" y1="72" x2="52" y2="105"/>
              <line class="s fig-ghost-stroke" x1="80" y1="72" x2="108" y2="105"/>
              <line class="s fig-ghost-stroke" x1="80" y1="120" x2="56" y2="175"/>
              <line class="s fig-ghost-stroke" x1="80" y1="120" x2="104" y2="175"/>
              <path class="wing" d="M102 70 C140 40, 152 90, 132 120" opacity="0.2"/>
            </svg>
          </div>
        </div>
        <div id="cap-wing" class="caption">蝴蝶翅膀，只画了左翼</div>
      </div>

      <!-- ========== SCENE 5: Note "换我。" ========== -->
      <div id="sc-note" class="scene clip" data-start="35.5" data-duration="7" data-track-index="5">
        <div class="desk"></div>
        <div class="paper" style="opacity: 0.7">
          <div class="paper-lines"></div>
          <div class="margin-rule"></div>
          <!-- empty — hero gone -->
        </div>
        <div id="note" class="note">
          <div class="note-text">换我。</div>
        </div>
        <div id="mug-back" class="mug" style="left: 1480px; top: 700px; opacity: 0.9"></div>
        <div id="cap-note" class="caption">灰人不见了，只留下两个字</div>
      </div>

      <!-- ========== SCENE 6: New stickman with left wing ========== -->
      <div id="sc-new" class="scene clip" data-start="41.5" data-duration="8" data-track-index="6">
        <div class="desk"></div>
        <div id="day-label" class="day-label">DAY 2</div>
        <div class="paper">
          <div class="paper-lines"></div>
          <div class="margin-rule"></div>
          <div id="new-hero" class="fig" style="left: 690px; top: 280px; width: 160px; height: 260px">
            <svg viewBox="0 0 160 220">
              <path id="new-wing" class="wing-fill" d="M58 70 C20 40, 8 90, 28 120 C40 140, 52 110, 58 95 Z"/>
              <circle class="h" cx="80" cy="40" r="18"/>
              <line class="s" x1="80" y1="58" x2="80" y2="125"/>
              <line class="s" x1="80" y1="75" x2="48" y2="110"/>
              <line class="s" x1="80" y1="75" x2="112" y2="110"/>
              <line class="s" x1="80" y1="125" x2="52" y2="185"/>
              <line class="s" x1="80" y1="125" x2="108" y2="185"/>
            </svg>
          </div>
        </div>
        <div id="cap-new" class="caption">灰色，有左翼</div>
      </div>

      <!-- ========== SCENE 7: Pen hovering ========== -->
      <div id="sc-pen" class="scene clip" data-start="48.5" data-duration="7.5" data-track-index="7">
        <div class="desk"></div>
        <div class="paper" style="left: 360px; top: 100px; width: 1200px; height: 780px">
          <div class="paper-lines"></div>
          <div id="final-hero" class="fig" style="left: 520px; top: 240px; width: 160px; height: 260px">
            <svg viewBox="0 0 160 220">
              <path class="wing-fill" d="M58 70 C20 40, 8 90, 28 120 C40 140, 52 110, 58 95 Z"/>
              <circle class="h" cx="80" cy="40" r="18"/>
              <line class="s" x1="80" y1="58" x2="80" y2="125"/>
              <line class="s" x1="80" y1="75" x2="48" y2="110"/>
              <line class="s" x1="80" y1="75" x2="112" y2="110"/>
              <line class="s" x1="80" y1="125" x2="52" y2="185"/>
              <line class="s" x1="80" y1="125" x2="108" y2="185"/>
            </svg>
          </div>
        </div>
        <div id="pen" class="pen" style="left: 1180px; top: 180px">
          <div class="pen-tip"></div>
        </div>
        <div id="cap-pen" class="caption caption-dim">笔尖悬在纸上，迟迟没落下</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const o = { overwrite: "auto" };

      // Joint origins for climb limbs
      gsap.set(["#climb-arm-L", "#hero-arm-L"], { svgOrigin: "60 60" });
      gsap.set(["#climb-arm-R", "#hero-arm-R"], { svgOrigin: "60 60" });
      gsap.set(["#climb-leg-L", "#hero-leg-L"], { svgOrigin: "60 110" });
      gsap.set(["#climb-leg-R", "#hero-leg-R"], { svgOrigin: "60 110" });

      // ========== TITLE 0–5 ==========
      tl.set("#sc-title", { opacity: 1 }, 0);
      tl.from("#title-main", { opacity: 0, y: 20, duration: 1.2, ease: "power2.out" }, 0.3);
      tl.from("#title-sub", { opacity: 0, duration: 1, ease: "power2.out" }, 0.9);
      tl.to("#sc-title", { opacity: 0, duration: 0.8 }, 4.2);

      // ========== DEATH LOOP 4.5–16.5 ==========
      tl.set("#sc-loop", { opacity: 0 }, 0);
      tl.to("#sc-loop", { opacity: 1, duration: 0.8 }, 4.5);
      tl.from("#cap-loop", { opacity: 0, y: 12, duration: 0.6 }, 5.0);

      // Death cycle helper — hit / fall / burst, twice
      const deathCycle = (t0) => {
        // Hit
        tl.to("#impact", { opacity: 0.9, scale: 1.4, duration: 0.15, ...o }, t0);
        tl.to("#hero", { x: 40, rotation: -12, duration: 0.15, ease: "power2.out", ...o }, t0);
        tl.to("#impact", { opacity: 0, scale: 2, duration: 0.35, ...o }, t0 + 0.15);
        tl.to("#hero", { x: 0, rotation: 0, duration: 0.4, ease: "power2.inOut", ...o }, t0 + 0.35);

        // Fall
        tl.to("#hero", { y: 220, rotation: 95, duration: 0.7, ease: "power2.in", ...o }, t0 + 1.0);
        tl.to("#hero", { opacity: 0.3, duration: 0.2, ...o }, t0 + 1.55);
        tl.set("#hero", { y: 0, rotation: 0, opacity: 1 }, t0 + 1.85);

        // Explode
        tl.to("#hero", { scale: 1.15, duration: 0.12, ...o }, t0 + 2.1);
        tl.to("#hero", { opacity: 0, scale: 0.3, duration: 0.25, ease: "power2.in", ...o }, t0 + 2.25);
        tl.set(["#burst-1", "#burst-2", "#burst-3", "#burst-4"], { opacity: 1, x: 0, y: 0 }, t0 + 2.25);
        tl.to("#burst-1", { x: 60, y: -50, opacity: 0, duration: 0.45, ...o }, t0 + 2.3);
        tl.to("#burst-2", { x: -55, y: -40, opacity: 0, duration: 0.45, ...o }, t0 + 2.3);
        tl.to("#burst-3", { x: 45, y: 55, opacity: 0, duration: 0.45, ...o }, t0 + 2.3);
        tl.to("#burst-4", { x: -50, y: 50, opacity: 0, duration: 0.45, ...o }, t0 + 2.3);
        tl.set("#hero", { scale: 1, opacity: 1 }, t0 + 2.9);
      };
      deathCycle(5.5);
      deathCycle(9.0);
      deathCycle(12.5);

      tl.to("#ghost-1", { opacity: 0.15, duration: 2, yoyo: true, repeat: 2 }, 5.5);
      tl.to("#ghost-2", { opacity: 0.1, duration: 2.4, yoyo: true, repeat: 2 }, 6.0);
      tl.to("#sc-loop", { opacity: 0, duration: 0.7 }, 15.8);

      // ========== COFFEE 15.5–22.5 ==========
      tl.set("#sc-coffee", { opacity: 0 }, 0);
      tl.to("#sc-coffee", { opacity: 1, duration: 0.7 }, 15.8);
      tl.from("#cap-coffee", { opacity: 0, duration: 0.5 }, 16.2);
      tl.to("#mug", { x: 200, opacity: 0, duration: 1.2, ease: "power1.in", ...o }, 17.5);
      tl.to("#steam-1", { y: -30, opacity: 0, duration: 1.5, ...o }, 16.5);
      tl.to("#steam-2", { y: -40, opacity: 0, duration: 1.8, ...o }, 16.7);
      // Hero glances / fidgets
      tl.to("#hero-small", { x: 8, duration: 0.4, yoyo: true, repeat: 1, ...o }, 18.5);
      tl.to("#hero-small", { y: -6, duration: 0.35, yoyo: true, repeat: 2, ease: "sine.inOut", ...o }, 19.5);
      tl.to("#sc-coffee", { opacity: 0, duration: 0.6 }, 21.8);

      // ========== ESCAPE 21.5–30.5 ==========
      tl.set("#sc-escape", { opacity: 0 }, 0);
      tl.to("#sc-escape", { opacity: 1, duration: 0.6 }, 21.8);
      tl.from("#cap-escape", { opacity: 0, duration: 0.5 }, 22.2);
      tl.set("#hero-climb", { x: -120, y: 80 }, 21.8);

      // Climb toward folder
      const climbStep = (t, dx) => {
        tl.to("#climb-arm-L", { rotation: -30, duration: 0.28, ease: "sine.inOut", ...o }, t);
        tl.to("#climb-arm-R", { rotation: 30, duration: 0.28, ease: "sine.inOut", ...o }, t);
        tl.to("#climb-leg-L", { rotation: 25, duration: 0.28, ease: "sine.inOut", ...o }, t);
        tl.to("#climb-leg-R", { rotation: -25, duration: 0.28, ease: "sine.inOut", ...o }, t);
        tl.to("#hero-climb", { x: "+=" + dx, y: "-=18", duration: 0.28, ...o }, t);
        tl.to("#climb-arm-L", { rotation: 25, duration: 0.28, ease: "sine.inOut", ...o }, t + 0.28);
        tl.to("#climb-arm-R", { rotation: -25, duration: 0.28, ease: "sine.inOut", ...o }, t + 0.28);
        tl.to("#climb-leg-L", { rotation: -25, duration: 0.28, ease: "sine.inOut", ...o }, t + 0.28);
        tl.to("#climb-leg-R", { rotation: 25, duration: 0.28, ease: "sine.inOut", ...o }, t + 0.28);
        tl.to("#hero-climb", { x: "+=" + dx, y: "-=18", duration: 0.28, ...o }, t + 0.28);
      };
      climbStep(22.8, 70);
      climbStep(23.4, 70);
      climbStep(24.0, 75);
      climbStep(24.6, 80);
      climbStep(25.2, 70);

      // Slip into folder — scale down / fade into folder paper
      tl.to(
        ["#climb-arm-L", "#climb-arm-R", "#climb-leg-L", "#climb-leg-R"],
        { rotation: 0, duration: 0.3, ...o },
        25.8
      );
      tl.to("#hero-climb", { x: 280, y: -40, scale: 0.55, duration: 1.2, ease: "power2.inOut", ...o }, 26.0);
      tl.to("#folder", { scale: 1.04, duration: 0.4, yoyo: true, repeat: 1, ...o }, 26.8);
      tl.to("#cap-escape", { opacity: 0, duration: 0.4 }, 27.5);
      tl.to("#cap-escape-2", { opacity: 1, duration: 0.5 }, 28.0);
      tl.to("#sc-escape", { opacity: 0, duration: 0.6 }, 29.8);

      // ========== WING MEET 29.5–36.5 ==========
      tl.set("#sc-wing", { opacity: 0 }, 0);
      tl.to("#sc-wing", { opacity: 1, duration: 0.6 }, 29.8);
      tl.from("#cap-wing", { opacity: 0, duration: 0.5 }, 30.2);
      tl.from("#meet-hero", { x: -80, opacity: 0, duration: 1.0, ease: "power2.out", ...o }, 30.2);
      tl.from("#meet-wing", { opacity: 0, scale: 0.9, duration: 1.0, ease: "power2.out", ...o }, 30.8);
      // Wing breathes
      tl.to("#meet-wing", { rotation: -3, duration: 1.2, yoyo: true, repeat: 2, ease: "sine.inOut", ...o }, 31.5);
      tl.to("#meet-hero", { x: 40, duration: 1.5, ease: "power1.inOut", ...o }, 32.5);
      tl.to("#sc-wing", { opacity: 0, duration: 0.6 }, 35.8);

      // ========== NOTE 35.5–42.5 ==========
      tl.set("#sc-note", { opacity: 0 }, 0);
      tl.set("#note", { opacity: 0, scale: 0.85 }, 0);
      tl.to("#sc-note", { opacity: 1, duration: 0.6 }, 35.8);
      tl.from("#cap-note", { opacity: 0, duration: 0.5 }, 36.2);
      tl.to("#note", { opacity: 1, scale: 1, duration: 0.8, ease: "back.out(1.4)", ...o }, 37.0);
      tl.to("#note", { rotation: -2, duration: 1.5, yoyo: true, repeat: 1, ease: "sine.inOut", ...o }, 38.0);
      tl.to("#sc-note", { opacity: 0, duration: 0.6 }, 41.8);

      // ========== NEW HERO 41.5–49.5 ==========
      tl.set("#sc-new", { opacity: 0 }, 0);
      tl.set("#new-hero", { opacity: 0, y: 30 }, 0);
      tl.to("#sc-new", { opacity: 1, duration: 0.7 }, 41.8);
      tl.from("#day-label", { opacity: 0, duration: 0.5 }, 42.2);
      tl.from("#cap-new", { opacity: 0, duration: 0.5 }, 42.4);
      tl.to("#new-hero", { opacity: 1, y: 0, duration: 1.4, ease: "power2.out", ...o }, 43.0);
      // Wing unfurl
      tl.from("#new-wing", { scale: 0.2, opacity: 0, duration: 1.2, ease: "power2.out", transformOrigin: "100% 50%", ...o }, 43.6);
      tl.to("#new-hero", { y: -8, duration: 1.0, yoyo: true, repeat: 2, ease: "sine.inOut", ...o }, 45.0);
      tl.to("#sc-new", { opacity: 0, duration: 0.6 }, 48.8);

      // ========== PEN 48.5–56 ==========
      tl.set("#sc-pen", { opacity: 0 }, 0);
      tl.set("#pen", { rotation: 8 }, 0);
      tl.to("#sc-pen", { opacity: 1, duration: 0.7 }, 48.8);
      tl.from("#cap-pen", { opacity: 0, duration: 0.8 }, 49.5);
      // Pen hovers — almost falls, pulls back
      tl.to("#pen", { y: 40, rotation: 12, duration: 1.2, ease: "power1.inOut", ...o }, 50.0);
      tl.to("#pen", { y: 20, rotation: 6, duration: 1.0, ease: "power1.inOut", ...o }, 51.3);
      tl.to("#pen", { y: 55, rotation: 14, duration: 1.3, ease: "power1.inOut", ...o }, 52.4);
      tl.to("#pen", { y: 30, rotation: 8, duration: 1.2, ease: "power1.inOut", ...o }, 53.8);
      // Hold on final frame
      tl.to("#final-hero", { opacity: 0.95, duration: 0.5 }, 54.5);
      tl.to("#cap-pen", { opacity: 0.7, duration: 1.0 }, 54.5);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
